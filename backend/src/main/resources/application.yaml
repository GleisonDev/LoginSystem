server:
  port: 8080

spring:

  datasource:
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: false
    properties:
      hibernate:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: true
