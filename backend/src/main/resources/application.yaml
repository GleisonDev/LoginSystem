server:
  port: 8080

spring:
  # Configurações de Driver Comuns
  datasource:
    driver-class-name: org.postgresql.Driver

  # Configurações de JPA/Hibernate Comuns
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Configurações de Estrutura do Flyway Comuns
  flyway:
    enabled: true
    locations:
      - classpath:db/migration # Schema (tabelas)
      - classpath:db/testdata  # Dados Iniciais (seed)
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: true

# Configurações específicas de DDL e credenciais serão definidas nos perfis.